<div class="login-site">
<!-- Main Boxes -->
<div class="container" id="mainContainer">
  <div class="box1">
    <h2>Farmer</h2>
    <img src="./images/farmer.jpg" alt="farmer" class="box-image">
    <button class="box-buttons" onclick="showForm('farmerLoginForm')">Login</button>

<!-- Farmer Login Form -->
<div class="form-wrapper" id="farmerLoginForm">
  <h2>Farmer Login</h2>
  <form action="backend/login.php" method="POST" >
    <input type="hidden" name="role" value="farmer">
    <input type="text" name = 'email' placeholder="Username" required />
    <input type="password" name = 'password' placeholder="Password" required />
    <button type="submit" class="login">Login</button>
    <button type="button" class="back-button" onclick="goBack()">Back</button>
  </form>
</div>

<!-- Farmer Sign Up Form -->
<div class="form-wrapper" id="farmerSignupForm">
  <h2>Farmer Sign Up</h2>
  <form action="backend/register_farmer.php" method="POST" >
    <label for="name">Emri: </label>
    <input type="text" name = 'name' placeholder="Emri" required/>
    <label for="surname">Mbiemri: </label>
    <input type="text" name = 'location' placeholder="Mbiemri" required/>
    <label for="email">Email: </label>
    <input type="email" name = 'email' placeholder="Email"  required/>
    <label for="phonne">Telefon: </label>
    <input type="tel" name = 'phone' placeholder="+355" pattern="^\+355[2-9]\d{7,8}$"  required/>
    <label for="Password"  >Password: </label>
    <input type="password" name = 'password' placeholder="Password" required />
    <button type="submit" class="login">Sign Up</button>
    <button type="button" class="back-button" onclick="goBack()">Back</button>
  </form>
</div>

<!-- Customer Login Form -->
<div class="form-wrapper" id="customerLoginForm">
  <h2>Customer Login</h2>
  <form action="backend/login.php" method="POST" >
    <input type="hidden" name="role" value="client">
    <input type="text" name="email" placeholder="Username" required />
    <input type="password" name="password" placeholder="Password" required />
    <button type="submit" class="login">Login</button>
    <button type="button" class="back-button" onclick="goBack()">Back</button>
  </form>
</div>

<!-- Customer Sign Up Form -->
<div class="form-wrapper" id="customerSignupForm">
  <h2>Customer Sign Up</h2>
  <form action="backend/register_client.php" method="POST" >
    <label for="name">Emri: </label>
    <input type="text" name = 'name' placeholder="Emri" required/>
    <label for="surname">Mbiemri: </label>
    <input type="text" name = 'address' placeholder="Mbiemri" required/>
    <label for="email">Email: </label>
    <input type="email" name = 'email' placeholder="Email"  required/>
    <label for="phonne">Telefon: </label>
    <input type="tel" name = 'phone' placeholder="+355" pattern="^\+355[2-9]\d{7,8}$"  required/>
    <label for="Password">Password: </label>
    <input type="password" name = 'password' placeholder="Password" required />
    <button type="submit" class="login">Sign Up</button>
    <button type="button" class="back-button" onclick="goBack()">Back</button>
  </form>
</div>
<!--Bootstrap script-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js" integrity="sha384-k6d4wzSIapyDyv1kpU366/PK5hCdSbCRGRCMv+eplOQJWyd1fbcAu9OCUj5zNLiq" crossorigin="anonymous"></script>

</div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    fetch('./backend/get_session_status.php')
      .then(res => res.json())
      .then(session => {
        const loginBtn = document.getElementById("login-btn");
        const cartBtn = document.getElementById("cart-btn");
  
        if (session.logged_in) {
          loginBtn.classList.remove("btn-outline-success");
          loginBtn.classList.add("btn-danger");
          loginBtn.textContent = "Log Out";
          cartBtn.classList.remove("d-none");
  
          loginBtn.addEventListener("click", () => {
            fetch('./backend/logout.php')
              .then(() => window.location.href = "index.html");
          });
        } else {
          loginBtn.addEventListener("click", () => {
            window.location.href = "login.html";
          });
        }
      });
  }); </script>
